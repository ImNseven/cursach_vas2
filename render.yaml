services:
  - type: web
    name: legal-analysis-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legal-analysis-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://legal-analysis-frontend.onrender.com
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx400m
    healthCheckPath: /actuator/health

  - type: static
    name: legal-analysis-frontend
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://legal-analysis-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: legal-analysis-db
    databaseName: legal_analysis
    user: postgres
    plan: free

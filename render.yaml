services:
  - type: web
    name: legal-analysis-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legal-analysis-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        value: Ov23licGcpCKTS7ukwCR
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://legal-analysis-frontend.onrender.com
    healthCheckPath: /actuator/health

  - type: web
    name: legal-analysis-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://legal-analysis-backend.onrender.com
      - key: VITE_GITHUB_CLIENT_ID
        value: Ov23licGcpCKTS7ukwCR
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: legal-analysis-db
    databaseName: legal_analysis
    plan: free
